version: '3.9'

services:
  app:
    image: elkhuriby/lab6-app:latest
    ports:
      - "3000:3000"
    environment:
      DB_URL: mongodb://db:27017
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
      - ./db/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped

volumes:
  mongo-data: